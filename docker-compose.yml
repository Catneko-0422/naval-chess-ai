version: "3.8"
services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    image: naval-chess-backend:latest
    container_name: naval-chess-backend
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - backend_instance:/app/instance
    ports:
      - "5000:5000"
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5003
    image: naval-chess-frontend:latest
    container_name: naval-chess-frontend
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3000:3000"
    networks:
      - appnet
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "--eval", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

networks:
  appnet:
    driver: bridge

volumes:
  backend_instance:
